      <!-- Modal for Signing Up -->
<div class="modal fade" id="signupModal" tabindex="-1" aria-labelledby="signupModalLabel" aria-hidden="true">
  <div class="modal-dialog d-flex justify-content-center">
      <div class="modal-content w-75">
          <div class="modal-header">
              <h5 class="modal-title" id="signupModalLabel">Sign Up for Opportunity</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
              <form id="signupForm">
                  <h6 id="opportunityTitle"></h6>
                  <div class="form-outline mb-4">
                      <input type="text" id="name" class="form-control" required />
                      <label class="form-label" for="name">Full Name</label>
                  </div>

                  <div class="form-outline mb-4">
                      <input type="email" id="email" class="form-control" required />
                      <label class="form-label" for="email">Email Address</label>
                  </div>

                  <div class="form-outline mb-4">
                      <input type="text" id="role" class="form-control" required />
                      <label class="form-label" for="role">Role</label>
                  </div>

                  <button type="submit" class="btn btn-primary btn-block">Submit</button>
              </form>
              <p id="confirmationMessage" class="text-success mt-3" style="display: none;"></p>
          </div>
      </div>
  </div>
</div>
